# 워크플로우의 이름입니다. 깃허브 Actions 탭에 표시됩니다.
name: 통합 배포 파이프라인 (CI-CD)

# 1. 트리거 (어떤 사건이 발생했을 때 실행할 것인가?)
on:
  push:
    branches: ['main', 'develop'] # main, develop 브랜치에 코드가 push 되었을 때 실행
  workflow_dispatch: # 수동 실행 기능 유지

# 2. 작업 단위 (크게 빌드/테스트 단계와 배포 단계로 나뉩니다.)
jobs:
  # [첫 번째 작업: 코드 검증 및 빌드 (CI)]
  build-and-test:
    name: 코드 검증 및 빌드 작업
    runs-on: ubuntu-latest # 깃허브가 제공하는 최신 우분투 리눅스 서버에서 실행

    steps:
      # (1) 깃허브 서버로 내 코드를 복사해옵니다.
      - name: 📦 소스코드 체크아웃
        uses: actions/checkout@v4

      # (2) 노드(Node.js) 설치 및 캐시 설정
      - name: 🟢 Node.js 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '25' # 사용할 노드 버전
          cache: 'npm' # 라이브러리 설치 속도를 위해 캐싱 사용

      # (3) 필요한 라이브러리 설치 (npm ci는 lock 파일 기준 엄격 설치)
      - name: 📥 의존성 라이브러리 설치
        run: npm ci

      # (4) 코드 스타일 검사 (ESLint 등)
      - name: 🔍 코드 린트(Lint) 검사
        run: npm run lint

      # (5) 작성한 테스트 코드가 통과하는지 확인
      - name: 🧪 단위 테스트 실행
        run: npm test

      # (6) 빌드 대신 타입 검사를 진행하여 코드의 안정성을 확인
      - name: 🔍 타입 체크 (TSC)
        run: npx tsc --noEmit

  # [두 번째 작업: Firebase App Distribution 배포 (CD)]
  # 이 작업은 main 브랜치에 코드가 push(머지)되었을 때만 실행됩니다.
  distribute-android:
    name: Android 베타 배포
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      # (1) 소스코드 체크아웃
      - name: 📦 소스코드 체크아웃
        uses: actions/checkout@v4

      # (2) Node.js 환경 세팅
      - name: 🟢 Node.js 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      # (3) 의존성 라이브러리 설치
      - name: 📥 의존성 라이브러리 설치
        run: npm ci

      # (4) 자바(JDK) 환경 세팅
      - name: ☕ JDK 세팅
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # (5) 환경 변수 파일 생성 (.env.dev)
      - name: 📝 .env.dev 생성
        run: |
          echo "${{ secrets.ENV_DEV }}" > .env.dev

      # (6) Android 키스토어 복원
      - name: 🔑 Android 키스토어 복원
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

      # (7) 안드로이드 앱 빌드 (Develop Release)
      - name: 🔨 Android 빌드 (Develop Release)
        run: |
          cd android
          ./gradlew assembleDevelopRelease -PreactNativeArchitectures=arm64-v8a --no-daemon

      # (8) Firebase App Distribution 업로드
      - name: 🚀 Firebase App Distribution 업로드
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          groups: testers
          file: android/app/build/outputs/apk/develop/release/app-develop-release.apk

